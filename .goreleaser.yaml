version: 2

project_name: yahh

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Positronico/yahh/cmd.version={{.Version}}
      - -X github.com/Positronico/yahh/cmd.commit={{.ShortCommit}}
      - -X github.com/Positronico/yahh/cmd.date={{.Date}}

archives:
  - formats: [tar.gz]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

# The Homebrew formula in Positronico/homebrew-tap is maintained manually,
# same as snapem/claudeq (no PAT is configured anywhere). After a release:
