name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install zsh
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh
      - run: go vet ./...
      - run: go test ./...
      - run: go build .
      - name: End-to-end (zsh)
        run: ./test/e2e_zsh.sh
      - name: End-to-end (bash)
        run: ./test/e2e_bash.sh
